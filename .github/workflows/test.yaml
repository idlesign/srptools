name: Continuous Integration

on:
    push:
    pull_request:
      types:
        - opened
        - reopened
        - ready_for_review
        - synchronize

jobs:
  checks:
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.10"
          - 3.11
          - 3.12
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
        exclude:
          - os: macos-latest
            python-version: '3.10'
    runs-on:  ${{ matrix.os }}
    name: ${{ matrix.python-version }} on ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7
      - name: Set up uv and Python
        uses: astral-sh/setup-uv@v7
        with:
          python-version: ${{ matrix.python-version }}
          activate-environment: true
      - name: Sync dependencies
        run: uv sync --extra tests
      - name: Run tests
        run: uv run pytest
